rootLogger.level=warn
rootLogger.appenderRef.console.ref=ConsoleAppender
rootLogger.appenderRef.rolling.ref=RollingFileAppender

# Console Appender
appender.console.type=Console
appender.console.name=ConsoleAppender
appender.console.layout.type=PatternLayout
appender.console.layout.pattern=%d{dd-MM-yyyy HH:mm:ss} [%-5level] %logger{36} - %msg%n

# Rolling Appender
appender.rolling.type=RollingFile
appender.rolling.name=RollingFileAppender
appender.rolling.filename=logs/app.log
appender.rolling.filePattern=logs/app-%d{dd-MM-yyyy}.log
appender.rolling.layout.type=PatternLayout
appender.rolling.layout.pattern=%d{dd-MM-yyyy HH:mm:ss} [%-5level] %logger{36} - %msg%n

appender.rolling.policies.type=Policies
appender.rolling.policies.time.type=TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval=1
appender.rolling.policies.time.modulate=true

# Declaring logger for business logic
logger.app.name=com.wpn
logger.app.level=debug
logger.app.additivity=false
logger.app.appenderRef.console.ref=ConsoleAppender
logger.app.appenderRef.rolling.ref=RollingFileAppender

